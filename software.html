  <body>

    <div class="page-wrap">
      <!-- Software Page Header -->
      <header class="lib-page-header">
        <a href="index.html#recursos" class="back-link">← Volver a Recursos</a>
        <h1>Software de Ingeniería</h1>
        <p>
          Manuales, programas y utilidades técnicas de apoyo a la ingeniería
          civil de libre acceso.
        </p>
      </header>

      <!-- Controls -->
      <div class="controls">
        <div class="search-wrap">
          <i class="bx bx-search"></i>
          <input
            type="text"
            id="search"
            placeholder="Buscar software o herramienta…"
            autocomplete="off"
          />
        </div>
        <span class="refresh-badge" id="refresh-badge"></span>
        <div class="view-toggle">
          <button class="view-btn" id="btn-sidebar" title="Filtrar categorías">
            <i class="bx bx-filter-alt"></i>
          </button>
          <button
            class="view-btn active"
            id="btn-grid"
            title="Vista cuadrícula"
          >
            <i class="bx bxs-grid"></i>
          </button>
          <button class="view-btn" id="btn-list" title="Vista lista">
            <i class="bx bx-list-ul"></i>
          </button>
        </div>
      </div>

      <!-- Body: sidebar + content -->
      <div class="body-layout">
        <!-- Sidebar filter -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar">
          <div class="sidebar-header">
            <i class="bx bx-filter-alt"></i>
            <span>Categorías</span>
            <button class="close-sidebar" id="close-sidebar"><i class="bx bx-x"></i></button>
          </div>
          <div class="cat-search-wrap">
            <i class="bx bx-search"></i>
            <input
              id="cat-search"
              type="text"
              placeholder="Buscar..."
              autocomplete="off"
            />
          </div>
          <ul class="sidebar-list" id="sidebar-list">
            <li class="sidebar-item active" data-cat="all">
              <span>📂 Todo</span>
              <span class="cat-count" id="count-all">…</span>
            </li>
          </ul>
        </aside>

        <!-- Main content -->
        <main>
          <div class="results-meta" id="results-meta"></div>
          <div id="normas-root">
            <div class="loading-state">
              <i class="bx bx-loader-alt"></i>
              Cargando software desde Google Drive…
            </div>
          </div>
        </main>
      </div>
      <!-- /body-layout -->
    </div>
    <!-- footer inyectado por components.js -->
    <script src="./js/software.js" defer></script>
  </body>
</html>
