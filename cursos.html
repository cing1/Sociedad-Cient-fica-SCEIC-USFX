<!doctype html>
<html lang="es">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-182NL3DZ5M"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-182NL3DZ5M");
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cursos especializados en Ingeniería Civil exclusivos para socios SCEIC-USFX: Estructuras, Carreteras, Hidrosanitaria, Gerencia y Geodesia."
    />
    <title>Cursos — SCEIC-USFX</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Saira:ital,wght@0,100..900;1,100..900&family=Varela+Round&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/cursos.css" />
    <link rel="icon" type="image/png" href="img/logo-sceic.png" />

    <!-- Datos de cursos (debe cargarse ANTES del script de la página) -->
    <script src="./js/cursos.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/components.js"></script>
  </head>

  <body>
    <!-- LOADER -->
    <div id="loader">
      <img
        src="img/logo-sceic.png"
        alt="SCEIC Logo"
        class="loader-logo"
        onerror="
          this.style.display = 'none';
          this.nextElementSibling.style.display = 'flex';
        "
      />
      <div class="loader-logo-fallback" style="display: none">SCEIC</div>
      <div class="loader-bar"><div class="loader-fill"></div></div>
      <div class="loader-text">Cargando&hellip;</div>
    </div>

    <!-- NAV inyectado por components.js -->

    <div class="cursos-page">
      <!-- ── HERO ──────────────────────────────────────────── -->
      <div class="cursos-hero">
        <div class="cursos-hero-inner">
          <a href="index.html#recursos" class="cursos-back">
            <svg
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 19l-7-7 7-7"
              />
            </svg>
            Volver a Recursos
          </a>

          <h1>Cursos <span>SCEIC</span></h1>
          <p>
            Formación especializada en las áreas clave de la Ingeniería Civil,
            exclusiva para socios activos de la SCEIC-USFX.
          </p>
        </div>
      </div>

      <!-- ── CUERPO (sidebar + grid) ───────────────────────── -->
      <div class="cursos-body">
        <!-- Sidebar de categorías -->
        <aside class="cursos-sidebar" aria-label="Filtrar por categoría">
          <div class="sidebar-title">Categorías</div>
          <div class="filter-list" id="filter-list">
            <!-- Generado por JS -->
          </div>
        </aside>

        <!-- Área de resultados -->
        <section aria-label="Listado de cursos">
          <!-- Buscador -->
          <div class="cursos-search-wrap">
            <svg
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <circle cx="11" cy="11" r="8" />
              <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
            </svg>
            <input
              id="cursos-search"
              type="search"
              placeholder="Buscar curso, palabra clave o categoría…"
              autocomplete="off"
              aria-label="Buscar cursos"
              oninput="handleSearch(this.value)"
            />
          </div>

          <div class="cursos-results-info">
            <p class="results-count">
              Mostrando <strong id="count-visible">0</strong> cursos
            </p>
            <button
              class="btn-clear-filters"
              id="btn-clear"
              onclick="limpiarFiltros()"
            >
              ✕ Limpiar filtros
            </button>
          </div>

          <div class="cursos-grid" id="cursos-grid">
            <!-- Tarjetas generadas por JS -->
          </div>
        </section>
      </div>
    </div>

    <!-- FOOTER inyectado por components.js -->
    <div id="footer-placeholder"></div>

    <!-- ── Lógica de la página ────────────────────────────── -->
    <script>
      /* ── Configuración de categorías ────────────────────── */
      const CATEGORIAS = [
        { nombre: "Estructuras", color: "#1a56db", emoji: "🏗️" },
        { nombre: "Carreteras", color: "#ff7a48", emoji: "🛣️" },
        { nombre: "Hidrosanitaria", color: "#0593a2", emoji: "💧" },
        { nombre: "Gerencia", color: "#e3371e", emoji: "📊" },
        { nombre: "Geotecnia", color: "#8b5cf6", emoji: "🗺️" },
      ];

      /* Estado activo */
      let categoriasActivas = new Set(); // vacío = todas
      let terminoBusqueda = "";

      /* ── Utilidades ─────────────────────────────────────── */
      const slugCat = (nombre) =>
        nombre
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9-]/g, "");

      const colorPorCategoria = (nombre) =>
        (CATEGORIAS.find((c) => c.nombre === nombre) || {}).color || "#1a56db";

      const emojiPorCategoria = (nombre) =>
        (CATEGORIAS.find((c) => c.nombre === nombre) || {}).emoji || "📚";

      /* Reemplaza imagen rota con fallback emoji — sin comillas anidadas */
      function imgFallback(img, emoji) {
        img.parentElement.outerHTML = `<div class="curso-portada-fallback">${emoji}</div>`;
      }

      /* Convierte "TEXTO EN MAYÚSCULAS" → "Texto en mayúsculas" */
      function toSentenceCase(str) {
        if (!str) return str;
        const s = str.toLowerCase();
        return s.charAt(0).toUpperCase() + s.slice(1);
      }

      /* Cuenta cursos por categoría */
      const conteoPorCategoria = (cat) =>
        CURSOS.filter((c) => c.categoria === cat).length;

      /* ── Renderizar sidebar ──────────────────────────────── */
      function renderSidebar() {
        const lista = document.getElementById("filter-list");
        lista.innerHTML = CATEGORIAS.map((cat) => {
          const slug = slugCat(cat.nombre);
          const conteo = conteoPorCategoria(cat.nombre);
          const checked = categoriasActivas.has(cat.nombre);
          return `
            <label class="filter-item" for="filter-${slug}">
              <input
                type="checkbox"
                id="filter-${slug}"
                name="categoria"
                value="${cat.nombre}"
                ${checked ? "checked" : ""}
                style="--accent-cat: ${cat.color}"
                onchange="toggleCategoria('${cat.nombre}')"
              />
              <span class="filter-dot" style="background:${cat.color}"></span>
              <span class="filter-label">${cat.nombre}</span>
              <span class="filter-count">${conteo}</span>
            </label>`;
        }).join("");
      }

      /* ── Renderizar tarjetas ─────────────────────────────── */
      function renderCursos() {
        const grid = document.getElementById("cursos-grid");
        const term = terminoBusqueda.toLowerCase().trim();
        const minChars = 2;

        const filtrados = CURSOS.filter((curso) => {
          const catOk =
            categoriasActivas.size === 0 ||
            categoriasActivas.has(curso.categoria);
          
          // Normalizar texto para comparación (sin acentos, minúsculas)
          const normalizar = (txt) => 
            (txt || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          const termNorm = normalizar(term);
          const orgNorm = normalizar(curso.organizador);
          const catNorm = normalizar(curso.categoria);
          const nombreNorm = normalizar(curso.nombre);
          
          // Verificar si el término está contenido en organizador o categoría
          const orgMatch = orgNorm.includes(termNorm);
          const catMatch = catNorm.includes(termNorm);
          
          // Para nombre, buscar coincidencia parcial
          const nombreMatch = term.length >= minChars && nombreNorm.includes(termNorm);
          
          const busOk = term.length < minChars || orgMatch || catMatch || nombreMatch;
          return catOk && busOk;
        });

        document.getElementById("count-visible").textContent = filtrados.length;

        // Botón limpiar
        const btnClear = document.getElementById("btn-clear");
        const hayFiltros = categoriasActivas.size > 0 || !!term;
        btnClear.classList.toggle("visible", hayFiltros);

        if (filtrados.length === 0) {
          grid.innerHTML = `
            <div class="cursos-empty">
              <div class="cursos-empty-icon">🔍</div>
              <h3>Sin resultados</h3>
              <p>No encontramos cursos que coincidan con tu búsqueda o filtros activos.</p>
            </div>`;
          return;
        }

        grid.innerHTML = filtrados
          .map((curso) => {
            const color = colorPorCategoria(curso.categoria);
            const emoji = emojiPorCategoria(curso.categoria);
            // Intentar imagen; si falla mostrar fallback emoji
            const portadaHTML = curso.portada
              ? `<div class="curso-portada-wrap">
                 <img
                   class="curso-portada"
                   src="${curso.portada}"
                   alt="Portada de ${curso.nombre}"
                   loading="lazy"
                   onerror="imgFallback(this, '${emoji}')"
                 />
               </div>`
              : `<div class="curso-portada-fallback">${emoji}</div>`;

            return `
            <article class="curso-card" style="--card-accent: ${color}">
              ${portadaHTML}
              <div class="curso-body">
                <h3 class="curso-nombre">${toSentenceCase(curso.nombre)}</h3>
                <span class="curso-categoria">
                  <span class=""></span>
                  ${curso.categoria}
                </span>
                <p class="curso-organizador">
                  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path stroke-linecap="round" d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  ${curso.organizador}
                </p>
                <div class="curso-footer">
                  <a
                    class="curso-link"
                    href="${curso.link}"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Acceder al curso ${curso.nombre}"
                  >
                    Acceder al curso
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                  </a>
                </div>
              </div>
            </article>`;
          })
          .join("");
      }

      /* ── Acciones ────────────────────────────────────────── */
      function toggleCategoria(nombre) {
        if (categoriasActivas.has(nombre)) {
          categoriasActivas.delete(nombre);
        } else {
          categoriasActivas.add(nombre);
        }
        renderCursos();
      }

      function limpiarFiltros() {
        categoriasActivas.clear();
        terminoBusqueda = "";
        document.getElementById("cursos-search").value = "";
        renderSidebar();
        renderCursos();
      }

      /* ── Buscador ────────────────────────────────────────── */
      let debounceTimer;
      function handleSearch(value) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          terminoBusqueda = value;
          renderCursos();
        }, 220);
      }

      // Render inicial
      renderSidebar();
      renderCursos();
    </script>
  </body>
</html>
